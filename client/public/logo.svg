<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized 'Q' / Queue Circle -->
  <circle cx="50" cy="50" r="40" stroke="#0056b3" stroke-width="8" stroke-linecap="round" stroke-dasharray="180 60"/>
  
  <!-- Medical Cross in the center -->
  <path d="M50 35V65M35 50H65" stroke="#0056b3" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Queue dots representing people in line (Success green) -->
  <circle cx="80" cy="80" r="6" fill="#10b981"/>
  <circle cx="65" cy="85" r="4" fill="#10b981" opacity="0.6"/>
  <circle cx="50" cy="90" r="2" fill="#10b981" opacity="0.3"/>
</svg>
