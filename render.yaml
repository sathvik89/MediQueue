services:
  - type: web
    name: mediqueue-backend
    env: node
    region: ohio
    rootDir: server
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    numInstances: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # The following must be filled securely in the Render Dashboard
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
